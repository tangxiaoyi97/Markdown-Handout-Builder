name: Publish package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm instead of running a dry run"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Use latest npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium and Linux dependencies
        run: npm run install-browser -- --with-deps chromium

      - name: Install CJK fonts (Chinese text in the PDF)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-noto-cjk

      # prepublishOnly runs the same verification before the actual publish.
      - name: Publish dry run
        if: github.event_name == 'workflow_dispatch' && inputs.publish != true
        run: npm publish --dry-run

      - name: Publish to npm
        if: github.event_name == 'release' || inputs.publish == true
        run: npm publish --access public
