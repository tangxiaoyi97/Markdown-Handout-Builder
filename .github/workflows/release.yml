# Release pipeline: push a tag like v1.1.0 →
# full verification (tests + check/build/pdf) → npm publish with
# provenance → GitHub Release with generated notes.
#
# One-time setup: create an npm "Automation" access token at
# npmjs.com → Access Tokens, then save it as the repository secret
# NPM_TOKEN (Settings → Secrets and variables → Actions).

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance attestation

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e 'process.stdout.write(require("playwright/package.json").version)')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install CJK fonts
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-noto-cjk

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)" >&2
            exit 1
          fi

      - name: Test
        run: npm test

      - name: Build showcase (check + build + pdf)
        run: npm run check && npm run build && npm run pdf

      # verify 已在上面显式执行过；--ignore-scripts 跳过 prepublishOnly，
      # 避免在发布时把整套验证重复跑一遍
      - name: Publish to npm (with provenance)
        run: npm publish --ignore-scripts --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
