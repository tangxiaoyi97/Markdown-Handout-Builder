# The single release pipeline: push a tag like v2.1.0 →
# full verification (tests + root handout + obsidian showcase) →
# npm publish via Trusted Publishing (OIDC, no long-lived token) →
# GitHub Release with generated notes.
#
# A prerelease version (e.g. 2.1.0-beta.1) publishes under the "next"
# dist-tag and marks the GitHub Release as a prerelease; stable versions
# publish as "latest".
#
# Manual runs (workflow_dispatch) are dry runs by default; set the
# "publish" input to true only to publish outside the tag flow.
#
# One-time setup on npmjs.com → package → Settings → Trusted Publisher:
#   Publisher: GitHub Actions; Repository: this repo;
#   Workflow filename: release.yml.

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm instead of running a dry run"
        required: true
        default: false
        type: boolean

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm Trusted Publishing / provenance attestation

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Use latest npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e 'process.stdout.write(require("playwright/package.json").version)')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install CJK fonts
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-noto-cjk

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)" >&2
            exit 1
          fi

      - name: Test
        run: npm test

      - name: Build root handout (check + build + pdf)
        run: npm run check && npm run build && npm run pdf

      - name: Build Obsidian showcase (check + build + pdf)
        run: |
          node bin/mhb.mjs check --config docs/obsidian-showcase/book.yml
          node bin/mhb.mjs build --config docs/obsidian-showcase/book.yml
          node bin/mhb.mjs pdf --config docs/obsidian-showcase/book.yml

      - name: Resolve npm dist-tag (prerelease → next)
        id: dist-tag
        run: echo "tag=$(node -p "require('./package.json').version.includes('-') ? 'next' : 'latest'")" >> "$GITHUB_OUTPUT"

      # verify 已在上面显式执行过；--ignore-scripts 跳过 prepublishOnly，
      # 避免在发布时把整套验证重复跑一遍
      - name: Publish dry run
        if: github.event_name == 'workflow_dispatch' && inputs.publish != true
        run: npm publish --dry-run --ignore-scripts --tag "${{ steps.dist-tag.outputs.tag }}"

      - name: Publish to npm (Trusted Publishing, with provenance)
        if: github.event_name == 'push' || inputs.publish == true
        run: npm publish --ignore-scripts --provenance --access public --tag "${{ steps.dist-tag.outputs.tag }}"

      - name: Create GitHub Release
        if: github.event_name == 'push'
        run: |
          PRERELEASE_FLAG=""
          if node -e "process.exit(require('./package.json').version.includes('-') ? 0 : 1)"; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes $PRERELEASE_FLAG
        env:
          GH_TOKEN: ${{ github.token }}
