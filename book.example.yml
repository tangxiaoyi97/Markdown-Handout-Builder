# =============================================================
# yaml-language-server: $schema=./book.schema.json
# book.example.yml - annotated configuration template
# Copy the fields you need into book.yml.
# Only title and exactly one of chapters/structure are required. Output paths
# default to dist/handout.html and dist/handout.pdf.
# Commented values document the defaults or common choices.
# =============================================================

title: "My Handout"                      # Required: cover, header, PDF Title
subtitle: "Markdown notes to HTML and PDF" # Cover, index page, PDF Subject
language: "en"                           # <html lang> and PDF language metadata
date: "2026-07-06"                       # Display date and PDF creation date
date_format: "YYYY-MM-DD"                # Also ISO, YYYYMMDD, YYMMDD,
#                                        # YYYY/MM/DD, YY/MM/DD, YYYY.MM.DD, YY.MM.DD
version: "3.0-dialect"                  # Handout/document edition.
#                                        # Shows on the cover and index page, and is
#                                        # available as {{version}} in header/footer
#                                        # slots and cover fragments.
authors:                                 # Cover and PDF Author
  - "Your Name"
keywords:                                # Optional PDF Keywords metadata
  - "Markdown"
  - "PDF"

chapters:                                # Required: order + role of each page.
  # A file entry's role comes from the extension (override with "as"):
  #   .md / .markdown -> chapter (rendered; joins the TOC and PDF bookmarks)
  #   .html / .htm    -> insert  (trusted raw-HTML page, verbatim, its own page)
  - notes/00-intro.md                    # string form = just the path
  - notes/01-topic.md
  - notes/interlude.html                 # a raw-HTML insert page
  # Mapping form, for entries that need extra options:
  - path: notes/02-deep.md               # "path" is required
    # role: chapter                      # Alias of legacy "as"; never write both
    class: deep-dive                     #   extra CSS class(es) on the <section>
    chapter_toc: true                    #   open this chapter with a mini-TOC
    # toc: false                         #   keep this chapter out of the main TOC
    # toc: "Appendix A"                  #   ... or just rename its main-TOC row
  # A Markdown special page (preface/colophon): rendered, but stays out of
  # the main TOC and carries the "insert" styling hooks:
  #   - path: front/preface.md
  #     as: insert
  # Declared special pages need no file at all:
  #   - divider:                         # part-divider page (one full page)
  #       title: "Part One"              #   becomes a real <h1> + PDF bookmark
  #       subtitle: "Foundations"
  #       note: "A short part description"
  #       class: part-one                #   style it from style.custom_css
  #       background: "#25304a"          #   any CSS color/gradient
  #       color: "#ffffff"
  #       bleed: true                    #   official PDF paints it edge-to-edge
  #       toc: "Part One"                #   optional main-TOC row
  #   - blank: true                      # intentionally blank page (duplex)
  #   - type: blank                      # long form: count + style/flow hooks
  #     count: 2                         # 1-20
  #     class: intentional-blank
  #     layout: body
  #     flow: { break_before: page, break_after: auto }
  #   - contents: true                   # place the main TOC here (at most once;
  #                                      # an in-flow TOC is always page-counted)
  # The whole list may instead live in its own file, like book.yml:
  #   chapters: chapters.yml             # a .yml/.yaml list (or a {chapters:} map)

# For richer books, replace the active `chapters:` block above with
# `structure:`. Both forms are supported, but they cannot appear together.
# Named layouts are reusable defaults; parts inherit defaults and flatten into
# the same linear renderer sequence. Includes may nest and are cycle-checked.
#
# layouts:
#   body:
#     class: layout-body
#     chapter_toc: true
#     meta: [authors, modified]
#     cover: false
#   no-footer:
#     extends: body
#     running:
#       footer: false
#       # header: true                   # Explicitly opt in if global switch is off
#   chapter-running:
#     extends: body
#     running:                            # Unspecified slots inherit global pdf.*
#       header:
#         center: "{{chapterTitle}}"
#       footer:
#         left: "Internal draft"
#         right: "Chapter A"
#       style:                            # Field-wise override of header_footer_style
#         font_size: "8px"
#         color: "#667085"
#         font_family: "Inter, Arial, sans-serif"
#         offset: "6mm"
#
# structure:
#   - type: insert
#     path: front/preface.md
#   - type: contents
#   - type: part
#     title: "Part One"
#     navigation: { label: "I · Foundations", level: 1 }
#     defaults: { layout: body }
#     # Use exactly one child-list key: children (preferred), chapters, or structure.
#     children:
#       - type: chapter
#         path: notes/00-intro.md
#       - include: parts/foundations.yml
#   - type: chapter
#     path: notes/appendix.md
#     layout: chapter-running             # Or no-footer
#     flow: { break_before: page, break_after: auto }
#     navigation:
#       toc: true
#       label: "Appendix A"
#       level: 1
#       outline: true
#     meta: [authors, modified]           # Frontmatter byline under the h1
#     # meta: false                       # Disable inherited/global byline
#     cover:                              # Chapter cover page from frontmatter
#       enabled: true
#       class: appendix-cover
#       background: "#25304a"
#       color: "#ffffff"
#       bleed: true                       #   official PDF paints edge-to-edge
#       title: "{{fm.title}}"
#       subtitle: "{{fm.subtitle}}"
#       meta: ["{{fm.authors}}", "Updated {{fm.modified}}"]
#
# Running slots may reference this chapter's frontmatter: "{{fm.status}}".
#
# Dialect-independent frontmatter integration (v3):
# frontmatter:
#   title_as_heading: true                # fm.title becomes the h1 when absent
#   meta: [authors, created, modified, tags]   # false or global byline keys
#   labels: { created: "Created", modified: "Updated" }
#   dates:
#     fallback_modified: none             # none | file (source mtime; unreliable in CI)

output:                                  # Optional output paths (both have defaults)
  html: dist/handout.html                # Non-default themes append .<theme>
  pdf: dist/handout.pdf

# ---------- Markdown dialect ----------
# Default is the backward-compatible strict renderer (raw HTML escaped;
# Obsidian wikilinks/embeds rejected). Opt in for a trusted Obsidian vault:
# markdown:
#   dialect: obsidian
#   obsidian:
#     vault_root: "."                     # relative to this config; default: .
#     properties: visible                # visible | hidden | source
# See DIALECTS.md for the complete compatibility and scope matrix.

# ---------- Table of contents ----------
toc:
  title: "Contents"                      # TOC heading
  depth: 2                               # Include heading levels h1..h2 (1-3)
  enabled: true                          # false disables the TOC entirely

# ---------- Per-chapter mini tables of contents ----------
# "In this chapter" — an auto-built list of a chapter's own sub-headings,
# rendered as an isolated <nav class="chapter-toc"> and given real PDF page
# numbers in the same pass as the main TOC. Off unless a chapter opts in with
# chapter_toc: true (or default: true here). Chapter mini-TOCs live in the body
# flow and are always counted toward page numbers.
chapter_toc:
  default: false                         # true = on for every chapter
  title: "In this chapter"               # heading above each mini-TOC ("" hides it)
  depth: 3                               # include heading levels 2..depth (2-6)
  # class: compact-toc                   # extra CSS class on every chapter-toc

# ---------- Official PDF print options ----------
pdf:
  header_footer: true                    # Enable generated PDF header/footer
  toc_page_numbers: true                 # Two-pass real page numbers in TOC
  cover_header_footer: false             # true shows header/footer on counted cover
  page_size: "A4"                        # A4, A5, Letter, etc.
  margin: "18mm 16mm 20mm 16mm"          # top right bottom left
  # date_format: "YYMMDD"                # Optional header/footer override
  page_numbers:
    format: "{{page}} / {{total}}"       # Also: "x", "x/x", "page-of-total"
    count_cover: true                    # false keeps cover in PDF but starts numbering after it
    count_toc: true                      # false keeps the contents page but leaves it unnumbered
    count_back_cover: true               # false excludes enabled back cover from total pages
  header:
    left: "{{title}}"                    # Slots: left, center, right
    center: ""
    right: "{{date}}"
  footer:
    left: ""
    center: "{{page}} / {{total}}"       # All slots accept placeholders:
    right: ""                            # {{title}} {{subtitle}} {{authors}} {{author}}
                                         # {{date}} {{rawDate}} {{version}} {{commit}}
                                         # {{lang}} {{theme}} {{page}} {{total}}
                                         # {{commit}} = note repo's short git hash
                                         # (build provenance; "-dirty" when uncommitted;
                                         # empty outside a git repo)
  header_footer_style:
    font_size: "8.5px"
    color: "#8a919a"
    # font_family: "Inter, Arial, sans-serif"
    # offset: "6mm"                        # Distance from the paper edge.
    #                                      # Default: 38% of the page margin (3-8mm).

# ---------- Cover and back cover ----------
cover:
  enabled: true
  # html: "templates/cover.html"         # Trusted HTML fragment with placeholders:
  #                                      # {{title}} {{subtitle}} {{authors}} {{date}}
  #                                      # {{version}} {{lang}}
  # background: "linear-gradient(160deg, #0f2c66 0%, #4527a0 100%)"
  # color: "#ffffff"

back_cover:
  enabled: false
  # html: "templates/back-cover.html"
  # background: "#0f172a"
  # color: "#e2e8f0"

# ---------- Labels and custom containers ----------
# Built-in labels default to English. Localize or rename them here, and
# define NEW keys to create your own containers: ::: key renders as a
# tip-styled admonition (classes: admonition-custom admonition-<key>,
# restyle via custom CSS). Keys must match [A-Za-z][A-Za-z0-9_-]*.
# The tool never generates numbers: write numbers directly in headings,
# environment names (::: theorem 3.1 Cauchy), captions, or KaTeX \tag.
# labels:
#   note: "注意"
#   tip: "提示"
#   warning: "警告"
#   danger: "危险"
#   theorem: "定理"
#   definition: "定义"
#   example: "示例"
#   exercise: "练习"
#   keypoint: "划重点"

# ---------- Style ----------
style:
  accent_color: "#111111"                # Links and primary controls (monochrome default)
  content_width: "860px"                 # Max reading width on screen
  base_font_size: "16px"                 # Screen font size
  print_font_size: "11pt"                # PDF / print font size
  # fonts:
  #   body: '"Noto Serif", serif'
  #   heading: '"Inter", sans-serif'
  #   code: '"JetBrains Mono", Menlo, monospace'
  # custom_css: "templates/custom.css"   # Loaded last. Can also be an array:
  # custom_css: ["templates/fonts.css", "templates/custom.css"]
  #
  # Bundled font workflow:
  # Put .woff2 files under notes/assets/fonts/.
  # In custom CSS:
  #   @font-face { font-family: "MyFont"; src: url("assets/fonts/MyFont.woff2") format("woff2"); }
  # Then set fonts.body to "MyFont". The font file is copied into dist/assets/
  # and can be embedded by Chromium when rendering the PDF.

# ---------- Multiple themes ----------
# Each theme may override style, cover, back_cover, and pdf.
# The default theme uses output.html / output.pdf.
# Other themes produce handout.<name>.html / handout.<name>.pdf.
themes:
  - name: light                          # Used in filenames. Use letters, digits, - and _
    label: "Light"                       # Display label on the index page
    default: true
  - name: dark
    label: "Dark"
    style:
      accent_color: "#eaeaea"
      custom_css: "templates/theme-dark.css" # Built in. Local file wins if present.
    # Every theme may override style, cover, back_cover, and pdf. Nested PDF
    # slots/page_numbers/header_footer_style merge field by field:
    cover:
      background: "linear-gradient(160deg, #111827, #312e81)"
      color: "#ffffff"
    back_cover:
      background: "#111827"
      color: "#ffffff"
    pdf:
      header_footer_style:
        color: "#9a9a9a"
  # More built-in themes (variable-only files, easy to copy and adapt):
  # - name: sepia
  #   label: "Sepia"
  #   style:
  #     accent_color: "#6b4f2a"
  #     custom_css: "templates/theme-sepia.css"   # warm paper look
  # - name: clay
  #   label: "Clay"
  #   style:
  #     accent_color: "#3f6cae"
  #     custom_css: "templates/theme-clay.css"    # warm off-white, soft accents
  # - name: academic
  #   label: "Academic"
  #   style:
  #     custom_css: "templates/theme-academic.css" # serif, justified print
