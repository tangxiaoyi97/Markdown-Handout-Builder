title: "Obsidian Markdown"
subtitle: "静态语法全覆盖 · HTML / PDF Showcase"
language: "zh-CN"
date: "2026-07-10"
date_format: "YYYY.MM.DD"
version: "3.0-dialect"
authors:
  - "Markdown Handout Builder"
keywords:
  - "Obsidian Flavored Markdown"
  - "Markdown"
  - "PDF"
  - "Showcase"

chapters:
  - path: notes/00-start-here.md
    chapter_toc: true
  - path: notes/01-links-and-blocks.md
    chapter_toc: true
  - path: notes/02-tasks-and-callouts.md
    chapter_toc: true
    meta: [status, tags]         # v3：章标题下的 frontmatter byline
  - path: notes/03-embeds-and-media.md
    chapter_toc: true
    cover:                       # v3：frontmatter 驱动的出血章节 cover
      background: "linear-gradient(150deg, #1d2a44 0%, #3f6cae 62%, #5f58b6 100%)"
      color: "#ffffff"
      bleed: true
  - path: notes/04-tables-code-math.md
    chapter_toc: true
  - path: notes/05-mermaid-and-boundaries.md
    chapter_toc: true
  - divider:                     # 声明式篇章隔页：无文件，官方 PDF 满版出血
      title: "参考资料"
      subtitle: "Reference Library · 链接与块引用的统一目标"
      background: "linear-gradient(150deg, #25304a 0%, #5f58b6 60%, #8d4f73 100%)"
      color: "#ffffff"
      bleed: true
      toc: "参考资料"
  - path: "notes/Reference Library.md"
    chapter_toc: true
    running:                     # v3：页脚中位取本章 frontmatter
      footer:
        center: "{{fm.status}} · {{fm.owner}}"

# 与手册同用 dist/ 输出约定（CI 将 dist/ 整体发布到 Pages）；文件名带版次
output:
  html: ../../dist/showcase/obsidian-syntax-showcase-3.0-dialect.html
  pdf: ../../dist/showcase/obsidian-syntax-showcase-3.0-dialect.pdf

frontmatter:                     # v3：byline / cover 的字段标签
  labels:
    created: "创建"
    modified: "更新"

markdown:
  dialect: obsidian
  obsidian:
    vault_root: "."
    properties: visible

toc:
  enabled: true
  title: "Showcase 目录"
  depth: 1

chapter_toc:
  default: true
  title: "本章覆盖"
  depth: 3

labels:
  note: "说明"
  tip: "提示"
  warning: "注意"
  danger: "危险"
  example: "示例"

style:
  accent_color: "#5f58b6"
  content_width: "920px"
  base_font_size: "16px"
  print_font_size: "10.5pt"
  custom_css:
    - "templates/theme-clay.css"
    - "showcase.css"

cover:
  enabled: true
  background: "linear-gradient(145deg, #f4f0e7 0%, #e8edf7 58%, #eee4df 100%)"
  color: "#25304a"

back_cover:
  enabled: true
  background: "linear-gradient(145deg, #25304a 0%, #4a4d86 100%)"
  color: "#ffffff"

pdf:
  page_size: "A4"
  margin: "17mm 16mm 19mm 16mm"
  page_numbers:
    format: "{{page}} / {{total}}"
    count_cover: true
    count_toc: true
    count_back_cover: true
  header:
    left: "{{title}}"
    center: "Obsidian dialect"
    right: "{{version}}"
  footer:
    left: "Markdown Handout Builder"
    center: "{{page}} / {{total}}"
    right: "{{date}}"
  header_footer_style:
    color: "#667085"
    font_size: "8px"
