<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Obsidian Markdown to PDF pipeline</title>
  <desc id="desc">A four-stage pipeline from vault files to validated syntax, HTML, and PDF.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f0e7"/>
      <stop offset="0.55" stop-color="#e9edf7"/>
      <stop offset="1" stop-color="#eee2dd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#25304a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7d8498"/>
    </marker>
  </defs>
  <rect width="960" height="420" rx="30" fill="url(#bg)"/>
  <g opacity="0.3" fill="none" stroke="#5f58b6">
    <path d="M76 74l38-38 38 38-38 38z"/>
    <path d="M822 332l48-48 48 48-48 48z"/>
  </g>
  <text x="60" y="72" fill="#25304a" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="700">Obsidian dialect pipeline</text>
  <text x="60" y="105" fill="#667085" font-family="Inter,Arial,sans-serif" font-size="16">vault-aware · validated · offline · print-ready</text>
  <g filter="url(#shadow)" font-family="Inter,Arial,sans-serif">
    <g transform="translate(60 160)">
      <rect width="180" height="130" rx="18" fill="#ffffff" stroke="#d8dbe5"/>
      <circle cx="34" cy="34" r="14" fill="#5f58b6"/>
      <text x="60" y="41" fill="#25304a" font-size="18" font-weight="700">Vault</text>
      <text x="24" y="78" fill="#667085" font-size="14">notes · properties</text>
      <text x="24" y="102" fill="#667085" font-size="14">links · attachments</text>
    </g>
    <g transform="translate(280 160)">
      <rect width="180" height="130" rx="18" fill="#ffffff" stroke="#d8dbe5"/>
      <circle cx="34" cy="34" r="14" fill="#3f6cae"/>
      <text x="60" y="41" fill="#25304a" font-size="18" font-weight="700">Check</text>
      <text x="24" y="78" fill="#667085" font-size="14">resolve targets</text>
      <text x="24" y="102" fill="#667085" font-size="14">validate fragments</text>
    </g>
    <g transform="translate(500 160)">
      <rect width="180" height="130" rx="18" fill="#ffffff" stroke="#d8dbe5"/>
      <circle cx="34" cy="34" r="14" fill="#4f7c68"/>
      <text x="60" y="41" fill="#25304a" font-size="18" font-weight="700">HTML</text>
      <text x="24" y="78" fill="#667085" font-size="14">transclusion · SVG</text>
      <text x="24" y="102" fill="#667085" font-size="14">offline assets</text>
    </g>
    <g transform="translate(720 160)">
      <rect width="180" height="130" rx="18" fill="#ffffff" stroke="#d8dbe5"/>
      <circle cx="34" cy="34" r="14" fill="#c87052"/>
      <text x="60" y="41" fill="#25304a" font-size="18" font-weight="700">PDF</text>
      <text x="24" y="78" fill="#667085" font-size="14">A4 · bookmarks</text>
      <text x="24" y="102" fill="#667085" font-size="14">TOC · metadata</text>
    </g>
  </g>
  <g stroke="#7d8498" stroke-width="2" marker-end="url(#arrow)">
    <path d="M240 225h30"/>
    <path d="M460 225h30"/>
    <path d="M680 225h30"/>
  </g>
  <text x="480" y="354" text-anchor="middle" fill="#4a5164" font-family="Inter,Arial,sans-serif" font-size="15">Markdown Handout Builder · dialects branch</text>
</svg>

