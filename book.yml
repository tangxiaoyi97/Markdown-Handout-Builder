title: "Markdown Handout Builder"
subtitle: "Usage Guide and Package Showcase"
language: "en"
date: "2026-07-06"
date_format: "YYYY.MM.DD"
version: "v1.2"

authors:
  - "Tangxy97"

keywords:
  - "Markdown"
  - "PDF"
  - "GitHub Pages"
  - "npm package"

chapters:
  - notes/00-overview.md
  - notes/01-quickstart.md
  - notes/02-writing.md
  - notes/03-publish.md

output:
  html: dist/handout.html
  pdf: dist/handout.pdf

toc:
  title: "Contents"
  depth: 2

pdf:
  header_footer: true
  toc_page_numbers: true
  cover_header_footer: false
  page_size: "A4"
  margin: "18mm 16mm 20mm 16mm"
  page_numbers:
    format: "{{page}} / {{total}}"
    count_cover: false
    count_back_cover: false
  header:
    left: "{{title}}"
    center: ""
    right: "{{date}}"
  footer:
    left: ""
    center: ""
    right: "{{page}}"
  header_footer_style:
    font_size: "8.5px"
    color: "#8a919a"

style:
  fonts:
    heading: 'Georgia, "Times New Roman", "Noto Serif CJK SC", "Source Han Serif SC", serif'

themes:
  - name: light
    label: "Light"
    default: true
  - name: dark
    label: "Dark"
    style:
      accent_color: "#eaeaea"
      custom_css: "templates/theme-dark.css"
    pdf:
      header_footer_style:
        color: "#9a9a9a"
